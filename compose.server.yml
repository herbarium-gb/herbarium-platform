x-iiif-base: &iiif-base
  image: uolibraries/rais:latest
  restart: unless-stopped
  environment:
    RAIS_ADDRESS: :12415
    RAIS_TILEPATH: /var/local/images
    RAIS_TILECACHELEN: 10000
  volumes:
    - ${IMAGE_DATA_PATH}/data/Delivery:/var/local/images:ro,Z
  expose:
    - "12415"

services:
  iiif_prod:
    <<: *iiif-base
    image: uolibraries/rais:stable
    environment:
      RAIS_ADDRESS: :12415
      RAIS_IIIFURL: https://${HOST_PROD}/iiif
      RAIS_LOGLEVEL: WARN

  iiif_stage:
    <<: *iiif-base
    build:
      context: ./iiif
    environment:
      RAIS_ADDRESS: :12415
      RAIS_IIIFURL: https://${HOST_STAGE}/iiif
      RAIS_LOGLEVEL: DEBUG

  web:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - iiif_prod
      - iiif_stage
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./caddy/Caddyfile.server:/etc/caddy/Caddyfile:ro,Z
      - ./viewer/prod:/srv_prod:ro,Z
      - ./viewer/stage:/srv_stage:ro,Z
      - caddy_data:/data
      - caddy_config:/config
